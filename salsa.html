<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SALSA — Fairy Agency</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body { margin:0; font-family:'Georgia',serif; background:#0a0a0a; color:#eaeaea; }

/* MENU */
.menu-btn {
  position:absolute;
  top:30px;
  left:25px;
  font-size:26px;
  color:#ffd700;
  z-index:10001;
  cursor:pointer;
}

.sidebar {
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100%;
  background:#0b0b0b;
  padding-top:90px;
  transition:0.3s;
  z-index:10000;
}

.sidebar.active { left:0; }

.menu-item {
  display:flex;
  align-items:center;
  gap:15px;
  padding:18px 25px;
  color:#ddd;
  text-decoration:none;
  font-size:18px;
}

.menu-item i { color:#ffd700; }

/* CONTENIDO */
.pagina {
  max-width:960px;
  margin:40px auto;
  padding:30px;
  background:#111;
  border-radius:16px;
  position:relative;
}

.logo {
  width:85px;
  display:block;
  margin:0 auto 10px;
}

h1 {
  text-align:center;
  color:#ffd700;
  margin-top:10px;
}

.sub {
  text-align:center;
  color:#aaa;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
  margin-top:30px;
}

.card {
  background:#1a1a1a;
  padding:30px;
  border-radius:16px;
  text-align:center;
  text-decoration:none;
  color:#eaeaea;
  transition:0.3s;
  border:2px solid #333;
}

.card:hover {
  background:#222;
  transform:scale(1.04);
  border-color:#ffd700;
}

.card i {
  font-size:50px;
  color:#ffd700;
  margin-bottom:10px;
}

</style>
</head>

<body>

<!-- MENU -->
<div class="menu-btn" onclick="toggleMenu()">
  <i class="fa-solid fa-bars"></i>
</div>

<div class="sidebar" id="menu">
  <a href="zona-streamer.html" class="menu-item">
    <i class="fa-solid fa-house"></i>Inicio
  </a>

  <a href="fairy-academy.html" class="menu-item">
    <i class="fa-solid fa-graduation-cap"></i>Fairy Academy
  </a>

  <a href="salsa.html" class="menu-item">
    <i class="fa-solid fa-fire"></i>SALSA
  </a>

  <a href="capacitaciones-salsa.html" class="menu-item">
    <i class="fa-solid fa-video"></i>Capacitaciones
  </a>

  <a href="reportes-salsa.html" class="menu-item">
    <i class="fa-solid fa-chart-column"></i>Reportes
  </a>

  <a href="binance-streamer.html" class="menu-item">
    <i class="fa-solid fa-bitcoin-sign"></i>Binance
  </a>

  <a href="noticias.html" class="menu-item">
    <i class="fa-solid fa-newspaper"></i>Noticias
  </a>

  <a href="reglamento-interno.html" class="menu-item">
    <i class="fa-solid fa-file-contract"></i>Reglamento
  </a>
</div>

<!-- CONTENIDO -->
<section class="pagina">

  <img src="https://i.postimg.cc/fLhtVJy2/1774069732194.png" class="logo">

  <h1>SALSA</h1>
  <p class="sub">Centro de herramientas y crecimiento</p>

  <div class="grid">

    <a href="capacitaciones-salsa.html" class="card">
      <i class="fa-solid fa-video"></i>
      <div>Capacitaciones</div>
    </a>

    <a href="#" class="card">
      <i class="fa-solid fa-screwdriver-wrench"></i>
      <div>Herramientas SALSA</div>
    </a>

  </div>

</section>

<script>
function toggleMenu() {
  document.getElementById("menu").classList.toggle("active");
}
</script>

</body>
</html>
