<!-- zona-streamer.html -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zona Streamer — Fairy Agency</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body { margin:0; font-family:'Georgia',serif; background:#0a0a0a; color:#eaeaea; }

/* MENU */
.menu-btn {
  position:absolute;
  top:30px;
  left:25px;
  font-size:26px;
  color:#ffd700;
  z-index:10001;
  cursor:pointer;
}

.sidebar {
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100%;
  background:#0b0b0b;
  padding-top:90px;
  transition:0.3s;
  z-index:10000;
}

.sidebar.active { left:0; }

.menu-item {
  display:flex;
  align-items:center;
  gap:15px;
  padding:18px 25px;
  color:#ddd;
  text-decoration:none;
  font-size:18px;
}

.menu-item i { color:#ffd700; }

/* CONTENIDO */
.pagina {
  max-width:960px;
  margin:40px auto;
  padding:30px;
  background:#111;
  border-radius:16px;
  display:none;
}

.pagina.activa { display:block; }

.logo { width:85px; display:block; margin:0 auto 10px; }

h1 { text-align:center; color:#ffd700; margin-top:10px; }

.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
  margin-top:30px;
}

.card {
  background:#1a1a1a;
  padding:30px;
  border-radius:16px;
  text-align:center;
  text-decoration:none;
  color:#eaeaea;
}

.card i { font-size:50px; color:#ffd700; }

/* MODAL */
#passwordModal {
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:20000;
}
</style>
</head>

<body>

<div id="passwordModal">
  <input type="password" id="passInput" placeholder="Contraseña">
  <button onclick="checkPassword()">Entrar</button>
</div>

<div class="menu-btn" onclick="toggleMenu()">
  <i class="fa-solid fa-bars"></i>
</div>

<div class="sidebar" id="menu">
  <a href="zona-streamer.html" class="menu-item"><i class="fa-solid fa-house"></i>Inicio</a>
  <a href="fairy-academy.html" class="menu-item"><i class="fa-solid fa-graduation-cap"></i>Fairy Academy</a>
  <a href="salsa.html" class="menu-item"><i class="fa-solid fa-fire"></i>SALSA</a>
  <a href="capacitaciones-salsa.html" class="menu-item"><i class="fa-solid fa-video"></i>Capacitaciones</a>
</div>

<section class="pagina" id="mainContent">
  <img src="https://i.postimg.cc/fLhtVJy2/1774069732194.png" class="logo">
  <h1>Zona Streamer — Fairy Agency</h1>

  <div class="grid">
    <a href="fairy-academy.html" class="card"><i class="fa-solid fa-graduation-cap"></i><br>Academy</a>
    <a href="salsa.html" class="card"><i class="fa-solid fa-fire"></i><br>SALSA</a>
  </div>
</section>

<script>
const PASSWORD = "fairy2025";

function checkPassword() {
  if (document.getElementById('passInput').value === PASSWORD) {
    document.getElementById('passwordModal').style.display = 'none';
    document.getElementById('mainContent').classList.add('activa');
  }
}

function toggleMenu() {
  document.getElementById("menu").classList.toggle("active");
}
</script>

</body>
</html>
